<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions - AuraSync Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
</head>

<body>
    <!-- Premium Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loader-content">
            <img src="logo.png" alt="AuraSync Logo" class="loader-logo">
            <div class="spinner"></div>
            <p id="loading-msg">Inizializzazione sistema...</p>
        </div>
    </div>

    <div class="container">
        <header class="glass">
            <div class="header-main">
                <div class="brand-wrapper">
                    <img src="logo.png" alt="AuraSync Logo" class="header-logo">
                    <div class="brand-text">
                        <h1>AuraSync</h1>
                        <p class="subtitle">Pro Lighting Controller</p>
                    </div>
                </div>
            </div>
            <div class="header-stats">
                <div id="bpm-display" class="stat-box">
                    <span class="label">BPM</span>
                    <span id="bpm-val" class="value">0</span>
                    <div id="header-beat-indicator" class="pulse-dot"></div>
                </div>
                <div class="stat-box">
                    <button id="auto-lights-btn" class="auto-toggle-btn">AUTO LIGHTS: OFF</button>
                </div>
                <div class="stat-box">
                    <span class="label">Status</span>
                    <span id="status" class="value">Disconnected</span>
                </div>
            </div>
            <div class="header-nav">
                <a href="index.html" class="tab-btn">Live Auto</a>
                <a href="functions.html" class="tab-btn active">Functions</a>
                <a href="console.html" class="tab-btn">Console</a>
                <a href="timeline.html" class="tab-btn">Timeline</a>
                <a href="fixtures.html" class="tab-btn">Fixtures</a>
                <a href="simple_desk.html" class="tab-btn">Simple Desk</a>
                <a href="setup.html" class="tab-btn">Setup</a>
            </div>
        </header>

        <main>
            <!-- Tab Functions: Manager -->
            <div id="functions-workspace" class="mode-container active">
                <div class="functions-grid">
                    <section class="glass-section function-sidebar">
                        <h2>Libreria Funzioni</h2>
                        <div class="side-controls">
                            <button onclick="AuraConsole.createSceneFromDump()" class="secondary-btn fluid-btn">Snapshot
                                DMX (Dump)</button>
                        </div>
                        <div id="function-list" class="function-scroll-list">
                            <!-- Functions injected here -->
                        </div>
                    </section>
                    <section class="glass-section function-editor">
                        <h2>Editor Funzione</h2>
                        <div id="function-editor-content" class="editor-placeholder">
                            Seleziona una funzione per modificarla
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>
    <script src="designer_rules.js?v=9"></script>
    <script src="visualizer3d.js?v=9"></script>
    <script src="console.js?v=9"></script>
    <script src="timeline.js?v=9"></script>
    <script src="app.js?v=9"></script>
</body>

</html>
